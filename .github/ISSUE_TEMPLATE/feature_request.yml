name: Feature Request
description: Suggest a new MCP tool or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      placeholder: "What problem does this solve? e.g. 'I want to query outstanding invoices by date range...'"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: "Describe what you'd like. If it's a new MCP tool, describe the inputs and expected output."
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New MCP tool (read)
        - New MCP tool (write)
        - GST / Tax
        - Inventory / Stock
        - Company management
        - Authentication / Security
        - Database / Analytics
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: tally-api
    attributes:
      label: Tally TDL / XML API details (if known)
      description: "If you know the Tally report/collection/function needed, describe it here."
      render: xml
