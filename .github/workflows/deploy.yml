name: Deploy to Tally MCP Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: github.repository == 'JINA-CODE-SYSTEMS/tally-mcp-server'
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
        working-directory: C:\tally-mcp-server

    steps:
      - name: Trust working directory
        run: git config --global --add safe.directory C:/tally-mcp-server

      - name: Pull latest code
        run: |
          git reset --hard HEAD
          git pull origin main

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npx tsc


      - name: Restart MCP Server
        run: |
          # Restart via scheduled task running as SYSTEM (has service control rights)
          $taskName = "TallyMCP_Restart"
          schtasks /Delete /TN $taskName /F 2>$null
          schtasks /Create /TN $taskName /TR "nssm restart TallyMCP" /SC ONCE /ST 00:00 /RU SYSTEM /F
          schtasks /Run /TN $taskName
          Start-Sleep -Seconds 8
          schtasks /Delete /TN $taskName /F 2>$null
          
          # Verify service is running
          $svc = Get-Service -Name TallyMCP -ErrorAction SilentlyContinue
          if ($svc -and $svc.Status -eq 'Running') {
            Write-Host "MCP server restarted successfully"
          } else {
            Write-Host "Warning: Service status is $($svc.Status). Check logs."
          }
