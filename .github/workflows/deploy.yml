name: Deploy to Tally MCP Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: github.repository == 'JINA-CODE-SYSTEMS/tally-mcp-server'
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
        working-directory: C:\tally-mcp-server

    steps:
      - name: Trust working directory
        run: git config --global --add safe.directory C:/tally-mcp-server

      - name: Pull latest code
        run: |
          git reset --hard HEAD
          git pull origin main

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npx tsc

        
      - name: Restart MCP Server
        run: |
          $svc = Get-Service -Name TallyMCP -ErrorAction SilentlyContinue
          if ($svc) {
            nssm restart TallyMCP
            Start-Sleep -Seconds 3
            $status = nssm status TallyMCP
            Write-Host "Service status: $status"
          } else {
            Write-Error "TallyMCP service not found. Run scripts/setup-windows.ps1 first."
            exit 1
          }
