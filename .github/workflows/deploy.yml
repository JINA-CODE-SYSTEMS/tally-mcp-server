name: Deploy to Tally MCP Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: github.repository == 'JINA-CODE-SYSTEMS/tally-mcp-server'
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
        working-directory: C:\tally-mcp-server

    steps:
      - name: Trust working directory
        run: git config --global --add safe.directory C:/tally-mcp-server

      - name: Pull latest code
        run: |
          git reset --hard HEAD
          git pull origin main

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npx tsc

      - name: Compile TallyUI DLL
        run: |
          $csc = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          & $csc /nologo /target:library /reference:System.Drawing.dll /out:scripts\TallyUI.dll scripts\TallyUI.cs
          if ($LASTEXITCODE -ne 0) { throw "Failed to compile TallyUI.dll" }
          Write-Host "TallyUI.dll compiled successfully"

      - name: Restart MCP Server
        shell: cmd
        run: |
          net stop TallyMCP 2>nul
          timeout /t 3 /nobreak >nul
          net start TallyMCP
          timeout /t 5 /nobreak >nul
          echo MCP server restarted
        continue-on-error: true
