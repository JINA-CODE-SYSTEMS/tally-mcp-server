name: Deploy to Tally MCP Server

permissions:
  contents: write

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: github.repository == 'JINA-CODE-SYSTEMS/tally-mcp-server'
    runs-on: self-hosted
    timeout-minutes: 10
    defaults:
      run:
        shell: powershell
        working-directory: C:\tally-mcp-server

    steps:
      - name: Trust working directory
        run: git config --global --add safe.directory C:/tally-mcp-server

      - name: Pull latest code
        run: |
          git reset --hard HEAD
          git pull origin main

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npx tsc

      - name: Compile TallyUI DLL
        run: |
          $csc = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          $tmpDll = "scripts\TallyUI.tmp.dll"
          $finalDll = "scripts\TallyUI.dll"
          & $csc /nologo /target:library /reference:System.Drawing.dll /out:$tmpDll scripts\TallyUI.cs
          if ($LASTEXITCODE -ne 0) { throw "Failed to compile TallyUI.dll" }
          # Kill any agent locking the old DLL
          Get-Process powershell -ErrorAction SilentlyContinue | Where-Object {
            try { (Get-WmiObject Win32_Process -Filter "ProcessId=$($_.Id)").CommandLine -match 'tally-gui-agent' } catch { $false }
          } | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep 2
          Move-Item $tmpDll $finalDll -Force
          Write-Host "TallyUI.dll compiled successfully"

      - name: Restart MCP Server
        shell: powershell
        run: |
          $serviceName = 'TallyMCP'
          $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
          if (-not $service) {
            throw "Service '$serviceName' does not exist on the runner host."
          }

          # 1. Kill ALL node server.mjs processes FIRST (non-blocking, frees port 3000)
          Write-Host "Killing node server.mjs processes..."
          Get-Process node -ErrorAction SilentlyContinue | ForEach-Object {
            try {
              $cmdline = (Get-WmiObject Win32_Process -Filter "ProcessId=$($_.Id)").CommandLine
              if ($cmdline -match 'server\.mjs') {
                Write-Host "  Killing node PID $($_.Id)"
                Stop-Process -Id $_.Id -Force
              }
            } catch {}
          }
          Start-Sleep -Seconds 2

          # 2. Non-blocking service stop via sc.exe (does NOT wait like Stop-Service)
          Write-Host "Issuing sc.exe stop..."
          sc.exe stop $serviceName 2>&1 | Out-String | Write-Host
          Start-Sleep -Seconds 3

          # 3. Force-kill if service is stuck in any pending state
          $service.Refresh()
          Write-Host "Service status: $($service.Status)"
          if ($service.Status -notin @('Stopped', 'Running')) {
            Write-Host "Service stuck in $($service.Status), force-killing service PID..."
            $svcPid = (Get-WmiObject Win32_Service -Filter "Name='$serviceName'").ProcessId
            if ($svcPid -and $svcPid -ne 0) {
              taskkill /F /PID $svcPid 2>&1 | Out-String | Write-Host
            }
            # Also kill any remaining node processes
            Get-Process node -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
            $service.Refresh()
            Write-Host "Service status after kill: $($service.Status)"
          }

          # 4. Start the service
          Write-Host "Starting service..."
          Start-Service -Name $serviceName -ErrorAction Stop

          # 4. Wait for Running state
          $deadline = (Get-Date).AddSeconds(30)
          do {
            $service.Refresh()
            if ($service.Status -eq 'Running') { break }
            Start-Sleep -Seconds 2
          } while ((Get-Date) -lt $deadline)

          if ($service.Status -ne 'Running') {
            throw "Service '$serviceName' is '$($service.Status)' after restart attempt."
          }
          Write-Host "Service is Running."

      - name: Verify local health endpoint
        shell: powershell
        run: |
          $uri = 'http://127.0.0.1:3000/healthz'
          $deadline = (Get-Date).AddSeconds(30)
          $lastError = $null

          do {
            try {
              $response = Invoke-RestMethod -Uri $uri -Method GET -TimeoutSec 5
              if ($response.status -eq 'ok') {
                Write-Host 'Health check passed'
                exit 0
              }
              $lastError = "Unexpected payload: $($response | ConvertTo-Json -Compress)"
            } catch {
              $lastError = $_.Exception.Message
            }
            Start-Sleep -Seconds 2
          } while ((Get-Date) -lt $deadline)

          throw "Health check failed for $uri. Last error: $lastError"

      - name: Capture diagnostics on failure
        if: failure()
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          $lines = @()
          $lines += "timestamp=$(Get-Date -Format o)"

          $service = Get-Service -Name TallyMCP -ErrorAction SilentlyContinue
          if ($service) {
            $lines += "service_name=$($service.Name)"
            $lines += "service_status=$($service.Status)"
          } else {
            $lines += 'service_name=TallyMCP'
            $lines += 'service_status=missing'
          }

          $lines += ''
          $lines += '[nssm status]'
          try {
            $lines += (& nssm status TallyMCP 2>&1 | Out-String)
          } catch {
            $lines += $_.Exception.Message
          }

          $lines += ''
          $lines += '[node processes]'
          try {
            $lines += (Get-Process node -ErrorAction SilentlyContinue | Select-Object Id, ProcessName, StartTime | Format-Table -AutoSize | Out-String)
          } catch {
            $lines += $_.Exception.Message
          }

          $lines += ''
          $lines += '[port 3000]'
          try {
            $lines += (netstat -ano | Select-String ':3000' | Out-String)
          } catch {
            $lines += $_.Exception.Message
          }

          $lines += ''
          $lines += '[logs/service.log tail]'
          try {
            $lines += (Get-Content .\logs\service.log -Tail 200 -ErrorAction Stop | Out-String)
          } catch {
            $lines += $_.Exception.Message
          }

          Set-Content -Path .\deploy-diagnostics.txt -Value ($lines -join "`r`n") -Encoding UTF8

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -B runner-diagnostics
          git add deploy-diagnostics.txt
          git commit -m 'chore: update runner diagnostics' --allow-empty
          git remote set-url origin "https://x-access-token:$env:GITHUB_TOKEN@github.com/$env:GITHUB_REPOSITORY.git"
          git push origin HEAD:runner-diagnostics --force
