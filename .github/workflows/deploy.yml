name: Deploy to Tally MCP Server

permissions:
  contents: write

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: github.repository == 'JINA-CODE-SYSTEMS/tally-mcp-server'
    runs-on: self-hosted
    timeout-minutes: 10
    defaults:
      run:
        shell: powershell
        working-directory: C:\tally-mcp-server

    steps:
      - name: Trust working directory
        run: git config --global --add safe.directory C:/tally-mcp-server

      - name: Pull latest code
        run: |
          git reset --hard HEAD
          git pull origin main

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npx tsc

      - name: Compile TallyUI DLL
        run: |
          $csc = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          $tmpDll = "scripts\TallyUI.tmp.dll"
          $finalDll = "scripts\TallyUI.dll"
          & $csc /nologo /target:library /reference:System.Drawing.dll /out:$tmpDll scripts\TallyUI.cs
          if ($LASTEXITCODE -ne 0) { throw "Failed to compile TallyUI.dll" }
          # Kill any agent locking the old DLL
          Get-Process powershell -ErrorAction SilentlyContinue | Where-Object {
            try { (Get-WmiObject Win32_Process -Filter "ProcessId=$($_.Id)").CommandLine -match 'tally-gui-agent' } catch { $false }
          } | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep 2
          Move-Item $tmpDll $finalDll -Force
          Write-Host "TallyUI.dll compiled successfully"

      - name: Diagnose Tally data folders and force-load all companies
        shell: powershell
        run: |
          $dataPath = 'C:\Users\Public\TallyPrimeEditLog\data'
          $tallyDir = 'C:\Program Files\TallyPrimeEditLog'
          $iniPath = "$tallyDir\tally.ini"

          Write-Host "=== 1. DEEP SCAN: All files inside data folders ==="
          if (Test-Path $dataPath) {
            Get-ChildItem -Path $dataPath -Recurse -Force -ErrorAction SilentlyContinue |
              Select-Object FullName, Length, LastWriteTime, Attributes, @{N='IsDir';E={$_.PSIsContainer}} |
              Format-Table -AutoSize -Wrap | Out-String | Write-Host
          } else {
            Write-Host "Data path NOT FOUND: $dataPath"
          }

          Write-Host "=== 2. SEARCH: Company.900, Manager.900, *.tsf, *.900 on C: ==="
          @('Company.900', 'Manager.900', '*.900', '*.500', 'TALLYSAV.tsf') | ForEach-Object {
            Write-Host "--- Searching for $_ ---"
            Get-ChildItem -Path C:\ -Recurse -Force -Filter $_ -ErrorAction SilentlyContinue |
              Select-Object FullName, Length, LastWriteTime |
              Format-Table -AutoSize | Out-String | Write-Host
          }

          Write-Host "=== 3. HEX DUMP: First 256 bytes of each file in data subfolders ==="
          Get-ChildItem -Path $dataPath -Recurse -File -Force -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "`nFile: $($_.FullName) | Size: $($_.Length) bytes"
            if ($_.Length -gt 0) {
              $raw = [System.IO.File]::ReadAllBytes($_.FullName)
              $len = [Math]::Min($raw.Length, 256)
              $hex = ($raw[0..($len-1)] | ForEach-Object { $_.ToString('X2') }) -join ' '
              $ascii = [System.Text.Encoding]::ASCII.GetString($raw, 0, $len) -replace '[^\x20-\x7E]','.'
              Write-Host "  HEX: $hex"
              Write-Host "  ASCII: $ascii"
            } else {
              Write-Host "  (empty / 0 bytes)"
            }
          }

          Write-Host "=== 4. OTHER TALLY INSTALLATIONS ==="
          @('C:\Program Files', 'C:\Program Files (x86)', 'C:\', 'D:\') | ForEach-Object {
            if (Test-Path $_) {
              Get-ChildItem -Path $_ -Filter "Tally*" -Directory -ErrorAction SilentlyContinue |
                Select-Object FullName | Out-String | Write-Host
            }
          }

          Write-Host "=== 5. ALL Tally*.exe PROCESSES ==="
          Get-Process -ErrorAction SilentlyContinue | Where-Object { $_.ProcessName -match 'tally' } |
            ForEach-Object {
              $cmd = try { (Get-WmiObject Win32_Process -Filter "ProcessId=$($_.Id)").CommandLine } catch { 'N/A' }
              Write-Host "PID=$($_.Id) Name=$($_.ProcessName) Path=$($_.Path) CMD=$cmd"
            }

          Write-Host "=== 6. NUMERIC FOLDERS: Everywhere under Tally dirs ==="
          @($dataPath, $tallyDir, 'C:\Users\Public\TallyPrime', 'C:\Users\Public\Tally.ERP9') | ForEach-Object {
            if (Test-Path $_) {
              Get-ChildItem -Path $_ -Directory -Force -ErrorAction SilentlyContinue |
                Where-Object { $_.Name -match '^\d+$' } | ForEach-Object {
                  $fc = (Get-ChildItem -Path $_.FullName -Recurse -Force -File -ErrorAction SilentlyContinue).Count
                  $sz = (Get-ChildItem -Path $_.FullName -Recurse -Force -File -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum
                  Write-Host "  $($_.FullName) => $fc files, $sz bytes total"
                }
            }
          }

          Write-Host "=== 7. TALLY.INI: current content ==="
          if (Test-Path $iniPath) { Get-Content $iniPath | Write-Host }

          Write-Host "=== 8. MODIFY tally.ini => Load ALL numeric folders ==="
          if (Test-Path $iniPath) {
            $ini = Get-Content $iniPath -Raw
            # Collect all numeric folders
            $folders = @()
            if (Test-Path $dataPath) {
              $folders = Get-ChildItem -Path $dataPath -Directory -Force -ErrorAction SilentlyContinue |
                Where-Object { $_.Name -match '^\d+$' } | Select-Object -ExpandProperty Name
            }
            Write-Host "Numeric folders to load: $($folders -join ', ')"
            # Remove all existing Load= lines
            $lines = $ini -split "`r?`n" | Where-Object { $_ -notmatch '^\s*Load\s*=' }
            # Insert Load= for each folder after Default Companies=Yes
            $newLines = @()
            foreach ($line in $lines) {
              $newLines += $line
              if ($line -match '^\s*Default Companies\s*=') {
                foreach ($f in $folders) {
                  $newLines += "Load=$f"
                  Write-Host "  Added: Load=$f"
                }
              }
            }
            Set-Content $iniPath -Value ($newLines -join "`r`n") -Encoding ASCII
            Write-Host "Updated tally.ini written."
          }

          Write-Host "=== 9. RESTART TALLY PRIME ==="
          $tallyExe = "$tallyDir\tally.exe"
          $tp = Get-Process -ErrorAction SilentlyContinue | Where-Object { $_.ProcessName -match 'tally' -and $_.Path -match 'TallyPrime' }
          if ($tp) {
            Write-Host "Killing existing Tally process(es): $($tp.Id -join ', ')"
            $tp | Stop-Process -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 5
          }
          if (Test-Path $tallyExe) {
            Write-Host "Starting Tally: $tallyExe"
            Start-Process $tallyExe -WorkingDirectory $tallyDir
            Write-Host "Waiting 20s for Tally to start and load companies..."
            Start-Sleep -Seconds 20
          } else {
            Write-Host "Tally exe not found at $tallyExe"
          }

          Write-Host "=== 10. QUERY TALLY XML API: List of Companies ==="
          try {
            $xml = '<?xml version="1.0" encoding="utf-8"?><ENVELOPE><HEADER><VERSION>1</VERSION><TALLYREQUEST>Export</TALLYREQUEST><TYPE>Data</TYPE><ID>List of Companies</ID></HEADER></ENVELOPE>'
            $bytes = [System.Text.Encoding]::GetEncoding('utf-16').GetBytes($xml)
            $response = Invoke-WebRequest -Uri 'http://localhost:9000' -Method POST -Body $bytes -ContentType 'text/xml; charset=utf-16' -TimeoutSec 15
            $text = [System.Text.Encoding]::GetEncoding('utf-16').GetString($response.Content)
            Write-Host "Tally response ($($text.Length) chars):"
            Write-Host $text
          } catch {
            Write-Host "Tally API error: $($_.Exception.Message)"
            Write-Host "Tally may still be loading. Will check again after MCP restart."
          }

          Write-Host "=== 11. TDL QUERY: Company collection with details ==="
          try {
            $tdlXml = @'
          <?xml version="1.0" encoding="utf-8"?>
          <ENVELOPE>
            <HEADER><VERSION>1</VERSION><TALLYREQUEST>Export</TALLYREQUEST><TYPE>Data</TYPE><ID>MCPCompanyDiag</ID></HEADER>
            <BODY><DESC><STATICVARIABLES><SVEXPORTFORMAT>$$SysName:XML</SVEXPORTFORMAT></STATICVARIABLES>
              <TDL><TDLMESSAGE>
                <REPORT NAME="MCPCompanyDiag"><FORMS>MCPCompDiagForm</FORMS></REPORT>
                <FORM NAME="MCPCompDiagForm"><PARTS>MCPCompDiagPart</PARTS><XMLTAG>DATA</XMLTAG></FORM>
                <PART NAME="MCPCompDiagPart"><LINES>MCPCompDiagLine</LINES><REPEAT>MCPCompDiagLine : MCPCompDiagCol</REPEAT><SCROLLED>Vertical</SCROLLED></PART>
                <LINE NAME="MCPCompDiagLine"><FIELDS>CDName,CDNumber,CDGuid,CDLoaded,CDPath,CDMail</FIELDS><XMLTAG>ROW</XMLTAG></LINE>
                <FIELD NAME="CDName"><SET>$Name</SET><XMLTAG>NAME</XMLTAG></FIELD>
                <FIELD NAME="CDNumber"><SET>$CompanyNumber</SET><XMLTAG>NUMBER</XMLTAG></FIELD>
                <FIELD NAME="CDGuid"><SET>$GUID</SET><XMLTAG>GUID</XMLTAG></FIELD>
                <FIELD NAME="CDLoaded"><SET>$$CmpIsLoaded:$Name</SET><XMLTAG>LOADED</XMLTAG></FIELD>
                <FIELD NAME="CDPath"><SET>$CompanyMailName</SET><XMLTAG>MAILNAME</XMLTAG></FIELD>
                <FIELD NAME="CDMail"><SET>$FormalName</SET><XMLTAG>FORMALNAME</XMLTAG></FIELD>
                <COLLECTION NAME="MCPCompDiagCol"><TYPE>Company</TYPE></COLLECTION>
              </TDLMESSAGE></TDL></DESC></BODY>
          </ENVELOPE>
          '@
            $bytes = [System.Text.Encoding]::GetEncoding('utf-16').GetBytes($tdlXml)
            $response = Invoke-WebRequest -Uri 'http://localhost:9000' -Method POST -Body $bytes -ContentType 'text/xml; charset=utf-16' -TimeoutSec 15
            $text = [System.Text.Encoding]::GetEncoding('utf-16').GetString($response.Content)
            Write-Host "TDL Company details ($($text.Length) chars):"
            Write-Host $text
          } catch {
            Write-Host "TDL query error: $($_.Exception.Message)"
          }

      - name: Restart MCP Server
        shell: powershell
        run: |
          $serviceName = 'TallyMCP'
          $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
          if (-not $service) {
            throw "Service '$serviceName' does not exist on the runner host."
          }

          # 1. Kill ALL node server.mjs processes FIRST (non-blocking, frees port 3000)
          Write-Host "Killing node server.mjs processes..."
          Get-Process node -ErrorAction SilentlyContinue | ForEach-Object {
            try {
              $cmdline = (Get-WmiObject Win32_Process -Filter "ProcessId=$($_.Id)").CommandLine
              if ($cmdline -match 'server\.mjs') {
                Write-Host "  Killing node PID $($_.Id)"
                Stop-Process -Id $_.Id -Force
              }
            } catch {}
          }
          Start-Sleep -Seconds 2

          # 2. Non-blocking service stop via sc.exe (does NOT wait like Stop-Service)
          Write-Host "Issuing sc.exe stop..."
          sc.exe stop $serviceName 2>&1 | Out-String | Write-Host
          Start-Sleep -Seconds 3

          # 3. Force-kill if service is stuck in any pending state
          $service.Refresh()
          Write-Host "Service status: $($service.Status)"
          if ($service.Status -notin @('Stopped', 'Running')) {
            Write-Host "Service stuck in $($service.Status), force-killing service PID..."
            $svcPid = (Get-WmiObject Win32_Service -Filter "Name='$serviceName'").ProcessId
            if ($svcPid -and $svcPid -ne 0) {
              taskkill /F /PID $svcPid 2>&1 | Out-String | Write-Host
            }
            # Also kill any remaining node processes
            Get-Process node -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
            $service.Refresh()
            Write-Host "Service status after kill: $($service.Status)"
          }

          # 4. Start the service
          Write-Host "Starting service..."
          Start-Service -Name $serviceName -ErrorAction Stop

          # 4. Wait for Running state
          $deadline = (Get-Date).AddSeconds(30)
          do {
            $service.Refresh()
            if ($service.Status -eq 'Running') { break }
            Start-Sleep -Seconds 2
          } while ((Get-Date) -lt $deadline)

          if ($service.Status -ne 'Running') {
            throw "Service '$serviceName' is '$($service.Status)' after restart attempt."
          }
          Write-Host "Service is Running."

      - name: Verify local health endpoint
        shell: powershell
        run: |
          $uri = 'http://127.0.0.1:3000/healthz'
          $deadline = (Get-Date).AddSeconds(30)
          $lastError = $null

          do {
            try {
              $response = Invoke-RestMethod -Uri $uri -Method GET -TimeoutSec 5
              if ($response.status -eq 'ok') {
                Write-Host 'Health check passed'
                exit 0
              }
              $lastError = "Unexpected payload: $($response | ConvertTo-Json -Compress)"
            } catch {
              $lastError = $_.Exception.Message
            }
            Start-Sleep -Seconds 2
          } while ((Get-Date) -lt $deadline)

          throw "Health check failed for $uri. Last error: $lastError"

      - name: Post-restart Tally company verification
        shell: powershell
        continue-on-error: true
        run: |
          Write-Host "=== FINAL: Querying Tally for loaded companies after full restart ==="
          Start-Sleep -Seconds 5
          try {
            $xml = '<?xml version="1.0" encoding="utf-8"?><ENVELOPE><HEADER><VERSION>1</VERSION><TALLYREQUEST>Export</TALLYREQUEST><TYPE>Data</TYPE><ID>List of Companies</ID></HEADER></ENVELOPE>'
            $bytes = [System.Text.Encoding]::GetEncoding('utf-16').GetBytes($xml)
            $response = Invoke-WebRequest -Uri 'http://localhost:9000' -Method POST -Body $bytes -ContentType 'text/xml; charset=utf-16' -TimeoutSec 15
            $text = [System.Text.Encoding]::GetEncoding('utf-16').GetString($response.Content)
            Write-Host "Built-in 'List of Companies' response:"
            Write-Host $text
          } catch {
            Write-Host "List of Companies failed: $($_.Exception.Message)"
          }

          try {
            $tdlXml = @'
          <?xml version="1.0" encoding="utf-8"?>
          <ENVELOPE>
            <HEADER><VERSION>1</VERSION><TALLYREQUEST>Export</TALLYREQUEST><TYPE>Data</TYPE><ID>MCPFinalCompDiag</ID></HEADER>
            <BODY><DESC><STATICVARIABLES><SVEXPORTFORMAT>$$SysName:XML</SVEXPORTFORMAT></STATICVARIABLES>
              <TDL><TDLMESSAGE>
                <REPORT NAME="MCPFinalCompDiag"><FORMS>MCPFCDForm</FORMS></REPORT>
                <FORM NAME="MCPFCDForm"><PARTS>MCPFCDPart</PARTS><XMLTAG>DATA</XMLTAG></FORM>
                <PART NAME="MCPFCDPart"><LINES>MCPFCDLine</LINES><REPEAT>MCPFCDLine : MCPFCDCol</REPEAT><SCROLLED>Vertical</SCROLLED></PART>
                <LINE NAME="MCPFCDLine"><FIELDS>FName,FNum,FGuid,FLoaded,FMail,FFormal</FIELDS><XMLTAG>ROW</XMLTAG></LINE>
                <FIELD NAME="FName"><SET>$Name</SET><XMLTAG>NAME</XMLTAG></FIELD>
                <FIELD NAME="FNum"><SET>$CompanyNumber</SET><XMLTAG>NUMBER</XMLTAG></FIELD>
                <FIELD NAME="FGuid"><SET>$GUID</SET><XMLTAG>GUID</XMLTAG></FIELD>
                <FIELD NAME="FLoaded"><SET>$$CmpIsLoaded:$Name</SET><XMLTAG>LOADED</XMLTAG></FIELD>
                <FIELD NAME="FMail"><SET>$CompanyMailName</SET><XMLTAG>MAILNAME</XMLTAG></FIELD>
                <FIELD NAME="FFormal"><SET>$FormalName</SET><XMLTAG>FORMALNAME</XMLTAG></FIELD>
                <COLLECTION NAME="MCPFCDCol"><TYPE>Company</TYPE></COLLECTION>
              </TDLMESSAGE></TDL></DESC></BODY>
          </ENVELOPE>
          '@
            $bytes = [System.Text.Encoding]::GetEncoding('utf-16').GetBytes($tdlXml)
            $response = Invoke-WebRequest -Uri 'http://localhost:9000' -Method POST -Body $bytes -ContentType 'text/xml; charset=utf-16' -TimeoutSec 15
            $text = [System.Text.Encoding]::GetEncoding('utf-16').GetString($response.Content)
            Write-Host "TDL Company details with folder mapping:"
            Write-Host $text
          } catch {
            Write-Host "TDL query error: $($_.Exception.Message)"
          }

          Write-Host "=== Tally processes still alive: ==="
          Get-Process -ErrorAction SilentlyContinue | Where-Object { $_.ProcessName -match 'tally' } |
            ForEach-Object { Write-Host "  PID=$($_.Id) Name=$($_.ProcessName)" }

      - name: Capture diagnostics on failure
        if: failure()
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          $lines = @()
          $lines += "timestamp=$(Get-Date -Format o)"

          $service = Get-Service -Name TallyMCP -ErrorAction SilentlyContinue
          if ($service) {
            $lines += "service_name=$($service.Name)"
            $lines += "service_status=$($service.Status)"
          } else {
            $lines += 'service_name=TallyMCP'
            $lines += 'service_status=missing'
          }

          $lines += ''
          $lines += '[nssm status]'
          try {
            $lines += (& nssm status TallyMCP 2>&1 | Out-String)
          } catch {
            $lines += $_.Exception.Message
          }

          $lines += ''
          $lines += '[node processes]'
          try {
            $lines += (Get-Process node -ErrorAction SilentlyContinue | Select-Object Id, ProcessName, StartTime | Format-Table -AutoSize | Out-String)
          } catch {
            $lines += $_.Exception.Message
          }

          $lines += ''
          $lines += '[port 3000]'
          try {
            $lines += (netstat -ano | Select-String ':3000' | Out-String)
          } catch {
            $lines += $_.Exception.Message
          }

          $lines += ''
          $lines += '[logs/service.log tail]'
          try {
            $lines += (Get-Content .\logs\service.log -Tail 200 -ErrorAction Stop | Out-String)
          } catch {
            $lines += $_.Exception.Message
          }

          Set-Content -Path .\deploy-diagnostics.txt -Value ($lines -join "`r`n") -Encoding UTF8

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -B runner-diagnostics
          git add deploy-diagnostics.txt
          git commit -m 'chore: update runner diagnostics' --allow-empty
          git remote set-url origin "https://x-access-token:$env:GITHUB_TOKEN@github.com/$env:GITHUB_REPOSITORY.git"
          git push origin HEAD:runner-diagnostics --force
