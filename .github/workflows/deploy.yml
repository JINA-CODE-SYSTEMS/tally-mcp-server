name: Deploy to Tally MCP Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: github.repository == 'JINA-CODE-SYSTEMS/tally-mcp-server'
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
        working-directory: C:\tally-mcp-server

    steps:
      - name: Trust working directory
        run: git config --global --add safe.directory C:/tally-mcp-server

      - name: Pull latest code
        run: |
          git reset --hard HEAD
          git pull origin main

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npx tsc


      - name: Restart MCP Server
        run: |
          # Kill all node processes - nssm will auto-restart the service
          $ErrorActionPreference = 'SilentlyContinue'
          taskkill /IM node.exe /F 2>&1 | Out-Null
          $ErrorActionPreference = 'Continue'
          Start-Sleep -Seconds 5
          Write-Host "MCP server restarting via nssm..."
