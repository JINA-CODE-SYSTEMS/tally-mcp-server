name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────
  # Build & Type Check
  # ──────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile (strict)
        run: npx tsc --noEmit

      - name: Full build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # Tests
  # ──────────────────────────────────────────────
  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ──────────────────────────────────────────────
  # Security Scan
  # ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production)
        run: npm audit --omit=dev --audit-level=high

  # ──────────────────────────────────────────────
  # Secret Leak Detection
  # ──────────────────────────────────────────────
  secret-scan:
    name: Secret Leak Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ──────────────────────────────────────────────
  # File Safety Checks
  # ──────────────────────────────────────────────
  file-safety:
    name: File Safety Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block sensitive files
        run: |
          BLOCKED=0
          # Check for log files
          if git diff --name-only --diff-filter=A origin/main...HEAD 2>/dev/null | grep -iE '\.(log|env|pem|key|pfx|p12)$'; then
            echo "::error::Sensitive file types detected in PR. Remove them before merging."
            BLOCKED=1
          fi
          # Check for common secret patterns in added lines
          if git diff origin/main...HEAD 2>/dev/null | grep -iE '^\+.*(password|secret|token|api_key)\s*[:=]\s*.{8,}'; then
            echo "::warning::Possible hardcoded secret detected. Please review."
          fi
          if [ "$BLOCKED" -eq 1 ]; then exit 1; fi
